<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>12恐龍捉迷藏 - MIRROR篇 (極致流暢漸變版)</title>
    <style>
        /* 漸變風格指南自定義變量 */
        :root {
            --apple-blue-start: #007AFF;
            --apple-blue-end: #0056B3;
            --apple-orange: #FF9500;
            --glass-bg: rgba(255, 255, 255, 0.82);
            --apple-text: #1C1C1E;
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0c1a10; /* 深森林底色 */
            overflow: hidden; 
            touch-action: none;
            width: 100vw;
            height: 100vh;
        }
        
        canvas { display: block; }
        
        /* UI 頂部 HUD */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 10;
        }
        
        .hud {
            display: flex; justify-content: space-between; 
            padding: calc(20px + env(safe-area-inset-top, 0px)) 20px 20px;
            pointer-events: auto;
            width: 100%;
        }
        
        .pill {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 22px; border-radius: 30px;
            font-weight: 600; color: var(--apple-text);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            font-size: 15px;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .pill.highlight {
            background: linear-gradient(135deg, #FF9500, #FF5E00);
            color: white;
            border: none;
            box-shadow: 0 8px 24px rgba(255, 149, 0, 0.3);
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* 模態框容器 - 支援動態避讓手機底部黑條 */
        .modal-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; 
            transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        
        .modal-container.active {
            opacity: 1; pointer-events: auto;
        }
        
        /* 解決 Safari 遮擋按鈕的核心樣式 */
        .modal {
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(245,247,250,0.98) 100%);
            width: 100%; max-width: 500px;
            border-radius: 32px 32px 0 0; 
            padding: 32px 24px calc(32px + var(--safe-area-bottom)); 
            transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.1, 0.8, 0.2, 1);
            text-align: center;
            box-shadow: 0 -15px 40px rgba(0, 0, 0, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.7);
            
            /* 關鍵防遮擋屬性 */
            max-height: 85vh; /* 限制最大高度為螢幕的 85% */
            overflow-y: auto; /* 超出內容自動生成內部滾動條 */
            -webkit-overflow-scrolling: touch; /* 讓 iOS 滾動更平滑 */
        }
        
        .modal-container.active .modal { transform: translateY(0); }
        
        /* 針對中央彈出（如開始/結束/提示） */
        .center-modal { align-items: center; justify-content: center; }
        .center-modal .modal { 
            border-radius: 28px; 
            width: 90%; 
            max-width: 400px;
            transform: scale(0.85); 
            padding: 36px 24px;
            max-height: 80vh; 
        }
        .modal-container.active .center-modal .modal { transform: scale(1); }
        
        .emoji-art { font-size: 55px; margin-bottom: 12px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1)); }
        .modal h2 { margin: 0 0 10px; font-size: 22px; color: var(--apple-text); font-weight: 700; }
        .modal p { color: #6E6E73; font-size: 15px; margin-bottom: 24px; line-height: 1.45; }
        
        /* 漸變風格指南：按鈕交互態設計 */
        .btn {
            background: linear-gradient(135deg, var(--apple-blue-start), var(--apple-blue-end));
            color: white; border: none;
            width: 100%; padding: 15px; border-radius: 16px;
            font-size: 16px; font-weight: 600; margin-bottom: 12px;
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.25);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: block;
        }
        .btn:active { 
            transform: scale(0.97); 
            filter: brightness(1.15); /* 色相與亮度過渡交互 */
            box-shadow: 0 2px 6px rgba(0, 122, 255, 0.1);
        }
        
        /* 選項按鈕 - 漸變描邊弱填充風格 */
        .btn-outline { 
            background: rgba(255, 255, 255, 0.7); 
            color: #007AFF; 
            border: 1.5px solid rgba(0, 122, 255, 0.35);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }
        .btn-outline:active { 
            background: rgba(0, 122, 255, 0.08);
            border-color: #007AFF;
            color: #0056B3;
        }
        
        #qOptions {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud" id="hud" style="display:none;">
            <div class="pill" id="timerDisplay">⏱️ 00:00</div>
            <div class="pill" id="scoreDisplay">🦖 0 / 12</div>
        </div>
    </div>

    <div class="modal-container active center-modal" id="startScreen">
        <div class="modal">
            <div class="emoji-art">🌲💖⛺</div>
            <h2>12恐龍捉迷藏</h2>
            <p>MIRROR 特別版 (極光流暢版)<br>在極光森林中尋找 12 隻隱藏的恐龍。<br>答對問題收服牠們，並帶回中央營地！</p>
            <button class="btn" onclick="startGame()">開始遊戲</button>
        </div>
    </div>

    <div class="modal-container" id="questionScreen">
        <div class="modal">
            <div class="emoji-art">🦖❓</div>
            <h2 id="qTitle">發現野生恐龍！</h2>
            <p id="qText">問題載入中...</p>
            <div id="qOptions"></div>
        </div>
    </div>

    <div class="modal-container center-modal" id="campHintScreen">
        <div class="modal">
            <div class="emoji-art">⛺🦖🔥</div>
            <h2>成功捉到12隻恐龍！</h2>
            <p>做得好！你已成功收服所有恐龍。<br>現在，請跟隨大隊回到地圖中央的 <strong>「中央營地 ⛺」</strong> 集合以結束遊戲！</p>
            <button class="btn" style="background: linear-gradient(135deg, #FF9500, #FF5E00); box-shadow: 0 4px 12px rgba(255,149,0,0.3);" onclick="closeCampHint()">出發回營地！</button>
        </div>
    </div>

    <div class="modal-container center-modal" id="endScreen">
        <div class="modal">
            <div class="emoji-art">🎉🏆⛺</div>
            <h2>順利回到營地！</h2>
            <p>你成功將 12 隻 MIRROR 恐龍帶回大本營！<br>總耗時：<strong id="finalTime">00:00</strong></p>
            <button class="btn" onclick="location.reload()">再玩一次</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // 解決視網膜高畫質螢幕模糊問題且兼顧性能
    const dpr = Math.min(window.devicePixelRatio || 1, 2); 
    function resize() {
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resize);
    resize();

    const WORLD_SIZE = 1300;
    let gameState = 'start';
    let startTime = 0;
    let timerInterval = null;
    let timeElapsed = 0;
    
    let camera = { x: 200, y: 200 };
    let input = { isDown: false, x: 0, y: 0 };

    const player = {
        x: 200, y: 200,
        speed: 4.5, size: 40, emoji: '🌼',
        history: [{x: 200, y: 200}], 
        caughtDinos: 0
    };

    const camp = {
        x: WORLD_SIZE / 2,
        y: WORLD_SIZE / 2,
        size: 70
    };
    
    const mirrorQuestions = [
        { q: "姜濤的粉絲名稱是什麼？", options: ["姜糖", "神徒", "爵屎"], ans: 0 },
        { q: "Anson Lo (盧瀚霆) 的專屬應援色是什麼？", options: ["粉紅色", "藍色", "綠色"], ans: 0 },
        { q: "Edan (呂爵安) 在《大叔的愛》中飾演什麼角色？", options: ["田一雄", "凌少牧", "翟國強"], ans: 0 },
        { q: "Ian (陳卓賢) 在入行前是哪一項運動的香港代表隊成員？", options: ["籃球", "排球", "足球"], ans: 1 },
        { q: "哪一首是 Jer (柳應廷) 的「物語系列」歌曲？", options: ["水刑物語", "狂人日記", "砂之器"], ans: 0 },
        { q: "AK 的全名是？", options: ["江𤒹生", "汪𤒹生", "江華生"], ans: 0 },
        { q: "Lokman (楊樂文) 在 MIRROR 中的職位是？", options: ["隊長", "副隊長", "忙內"], ans: 0 },
        { q: "Stanley (邱士縉) 有什麼稱號？", options: ["大表哥", "老虎仔", "皮皮"], ans: 0 },
        { q: "Frankie (陳瑞輝) 的別稱是什麼？", options: ["皮皮", "蛋白", "柳柳"], ans: 0 },
        { q: "Tiger (邱傲然) 最擅長的舞蹈/武術是？", options: ["拉丁舞", "芭蕾舞", "踢踏舞"], ans: 0 },
        { q: "Alton (王智德) 的經典金句是？", options: ["尋求無悔真生活", "焫焫焫焫焫著", "肌肉就是力量"], ans: 0 },
        { q: "Jeremy (李駿傑) 的粉絲名稱是？", options: ["Unicorn", "柳柳粉", "蛋白粉"], ans: 0 }
    ];

    const borders = [];
    const step = 50;
    for(let i = 0; i <= WORLD_SIZE; i += step) {
        borders.push({x: i, y: 0});
        borders.push({x: i, y: WORLD_SIZE});
        borders.push({x: 0, y: i});
        borders.push({x: WORLD_SIZE, y: i});
    }

    // 生成場景樹木 (避開中央營地 + 彼此保持距離)
    const trees = [];
    for(let i=0; i<65; i++) {
        let tx, ty;
        let attempts = 0;
        let valid = false;
        
        do {
            tx = Math.random() * (WORLD_SIZE - 100) + 50;
            ty = Math.random() * (WORLD_SIZE - 100) + 50;
            
            if (Math.hypot(tx - camp.x, ty - camp.y) < 180) continue;
            
            valid = true;
            for (let existing of trees) {
                if (Math.hypot(tx - existing.x, ty - existing.y) < 110) {
                    valid = false;
                    break;
                }
            }
            attempts++;
        } while (!valid && attempts < 80);
        
        if (valid) {
            trees.push({
                x: tx, y: ty,
                emoji: ['🌲','🌳','🌴'][Math.floor(Math.random()*3)],
                size: Math.random() * 20 + 40
            });
        }
    }

    const dinos = [];
    for(let i=0; i<12; i++) {
        let dx, dy;
        do {
            dx = Math.random() * (WORLD_SIZE - 200) + 100;
            dy = Math.random() * (WORLD_SIZE - 200) + 100;
        } while (Math.hypot(dx - camp.x, dy - camp.y) < 150);
        
        dinos.push({
            x: dx, y: dy,
            question: mirrorQuestions[i],
            state: 'hidden', 
            bushEmoji: '🌿'
        });
    }

    // --- 【效能最佳化 + 漸變風格】創建靜態離屏大畫布 bgCanvas ---
    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = WORLD_SIZE;
    bgCanvas.height = WORLD_SIZE;
    const bgCtx = bgCanvas.getContext('2d');

    // 漸變用色轉換
    function hexToRgba(hex, a) {
        let r = parseInt(hex.slice(1, 3), 16);
        let g = parseInt(hex.slice(3, 5), 16);
        let b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${a})`;
    }

    // 1. 繪製 Mesh Gradient 漸變底色（符合風格指南，使用 4 種深翠綠調配，杜絕雜亂）
    bgCtx.fillStyle = '#05190d';
    bgCtx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

    const gradientData = [
        {x: 0.1,  y: 0.1,  color: '#0e3a1d'},
        {x: 0.8,  y: 0.15, color: '#1b4d24'},
        {x: 0.3,  y: 0.75, color: '#092914'},
        {x: 0.9,  y: 0.85, color: '#2d6a3f'},
        {x: 0.5,  y: 0.5,  color: '#134021'}
    ];

    const maxRadius = WORLD_SIZE * 0.75; 
    gradientData.forEach(g => {
        const cx = g.x * WORLD_SIZE;
        const cy = g.y * WORLD_SIZE;
        const radGrad = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius);
        radGrad.addColorStop(0, hexToRgba(g.color, 1));
        radGrad.addColorStop(0.5, hexToRgba(g.color, 0.4));
        radGrad.addColorStop(1, hexToRgba(g.color, 0));
        bgCtx.fillStyle = radGrad;
        bgCtx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
    });

    // 2. 營地黃沙地與⛺標記（一次性繪製）
    bgCtx.fillStyle = '#E8D8BE';
    bgCtx.beginPath();
    bgCtx.arc(camp.x, camp.y, 75, 0, Math.PI * 2);
    bgCtx.fill();
    
    bgCtx.strokeStyle = '#D2B48C';
    bgCtx.lineWidth = 4;
    bgCtx.setLineDash([5, 10]);
    bgCtx.stroke();
    bgCtx.setLineDash([]);
    
    bgCtx.textAlign = 'center';
    bgCtx.textBaseline = 'middle';
    bgCtx.font = `${camp.size}px Arial`;
    bgCtx.fillText('⛺', camp.x, camp.y);

    // 3. 一次性把「邊界岩石 🪨」繪製在 bgCanvas
    bgCtx.font = `40px Arial`;
    borders.forEach(b => {
        bgCtx.fillText('🪨', b.x, b.y);
    });

    // 4. 一次性把「樹木 🌲」繪製在 bgCanvas
    trees.forEach(tree => {
        bgCtx.font = `${tree.size}px Arial`;
        bgCtx.fillText(tree.emoji, tree.x, tree.y);
    });
    // --- 靜態圖層離屏快取繪製完畢！ ---

    let currentDinoIndex = -1;

    function handleInputStart(e) {
        if(gameState !== 'playing') return;
        input.isDown = true;
        updateInputPos(e);
    }
    function handleInputMove(e) {
        if(!input.isDown || gameState !== 'playing') return;
        updateInputPos(e);
    }
    function handleInputEnd() { input.isDown = false; }
    
    function updateInputPos(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        input.x = clientX - window.innerWidth/2;
        input.y = clientY - window.innerHeight/2;
    }

    canvas.addEventListener('mousedown', handleInputStart);
    canvas.addEventListener('mousemove', handleInputMove);
    window.addEventListener('mouseup', handleInputEnd);
    canvas.addEventListener('touchstart', handleInputStart, {passive: false});
    canvas.addEventListener('touchmove', handleInputMove, {passive: false});
    window.addEventListener('touchend', handleInputEnd);

    window.startGame = function() {
        document.getElementById('startScreen').classList.remove('active');
        document.getElementById('hud').style.display = 'flex';
        gameState = 'playing';
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
        gameLoop();
    }

    function updateTimer() {
        if(gameState === 'start' || gameState === 'end') return;
        timeElapsed = Math.floor((Date.now() - startTime) / 1000);
        const m = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
        const s = String(timeElapsed % 60).padStart(2, '0');
        document.getElementById('timerDisplay').innerText = `⏱️ ${m}:${s}`;
    }

    function triggerQuestion(index) {
        gameState = 'question';
        input.isDown = false;
        currentDinoIndex = index;
        const dino = dinos[index];
        
        document.getElementById('qText').innerText = dino.question.q;
        const optsDiv = document.getElementById('qOptions');
        optsDiv.innerHTML = '';
        
        dino.question.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            optsDiv.appendChild(btn);
        });
        
        document.getElementById('questionScreen').classList.add('active');
    }

    function checkAnswer(selectedIndex) {
        const dino = dinos[currentDinoIndex];
        if(selectedIndex === dino.question.ans) {
            document.getElementById('questionScreen').classList.remove('active');
            dino.state = 'caught';
            player.caughtDinos++;
            
            if(player.caughtDinos < 12) {
                document.getElementById('scoreDisplay').innerText = `🦖 ${player.caughtDinos} / 12`;
                gameState = 'playing';
            } else {
                document.getElementById('scoreDisplay').innerText = `🦖 12 / 12 ✨`;
                triggerCampHint();
            }
        } else {
            const title = document.getElementById('qTitle');
            title.innerText = "答錯了！再試一次！";
            title.style.color = "#FF3B30";
            setTimeout(() => { title.innerText = "發現野生恐龍！"; title.style.color = "var(--apple-text)"; }, 1500);
        }
    }

    function triggerCampHint() {
        gameState = 'camp_hint';
        input.isDown = false;
        document.getElementById('campHintScreen').classList.add('active');
    }

    window.closeCampHint = function() {
        document.getElementById('campHintScreen').classList.remove('active');
        gameState = 'playing';
        
        const scoreDisp = document.getElementById('scoreDisplay');
        scoreDisp.innerText = `🧭 帶恐龍回營地 ⛺`;
        scoreDisp.classList.add('highlight');
    }

    function endGame() {
        gameState = 'end';
        clearInterval(timerInterval);
        const m = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
        const s = String(timeElapsed % 60).padStart(2, '0');
        document.getElementById('finalTime').innerText = `${m}:${s}`;
        document.getElementById('hud').style.display = 'none';
        setTimeout(() => { document.getElementById('endScreen').classList.add('active'); }, 500);
    }

    function gameLoop() {
        update();
        draw();
        if(gameState !== 'end') requestAnimationFrame(gameLoop);
    }

    function update() {
        if(gameState !== 'playing') return;

        let isMoved = false;

        if(input.isDown) {
            const dist = Math.hypot(input.x, input.y);
            if(dist > 5) {
                const dx = (input.x / dist) * player.speed;
                const dy = (input.y / dist) * player.speed;
                const nextX = Math.max(40, Math.min(WORLD_SIZE - 40, player.x + dx));
                const nextY = Math.max(40, Math.min(WORLD_SIZE - 40, player.y + dy));
                if (player.x !== nextX || player.y !== nextY) {
                    player.x = nextX;
                    player.y = nextY;
                    isMoved = true;
                }
            }
        }

        if (isMoved) {
            player.history.unshift({x: player.x, y: player.y});
            // 限制隊伍歷史軌跡，避免低階手機記憶體溢出
            const maxHistoryLength = (player.caughtDinos * 15) + 10;
            if(player.history.length > maxHistoryLength) player.history.pop();
        }

        camera.x += (player.x - camera.x) * 0.1;
        camera.y += (player.y - camera.y) * 0.1;

        if(player.caughtDinos < 12) {
            dinos.forEach((dino, index) => {
                if(dino.state === 'hidden') {
                    const dist = Math.hypot(player.x - dino.x, player.y - dino.y);
                    if(dist < 50) triggerQuestion(index);
                }
            });
        } else {
            const distToCamp = Math.hypot(player.x - camp.x, player.y - camp.y);
            if(distToCamp < 60) {
                endGame();
            }
        }
    }

    function draw() {
        // 1. 畫背景海藍色 (鏡頭外的水域)
        ctx.fillStyle = '#89CFF0';
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

        ctx.save();
        // 使用 ~~ 進行相機平移值取整，消滅抗鋸齒運算造成的流暢度損耗與模糊感
        ctx.translate(~~(window.innerWidth/2 - camera.x), ~~(window.innerHeight/2 - camera.y));

        // 2. 呼叫單次 drawImage，繪製離屏快取的「極光森林」大地層
        ctx.drawImage(bgCanvas, 0, 0);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 3. 繪製草叢 (動態恐龍隱藏點)
        ctx.font = '50px Arial';
        dinos.forEach(dino => {
            if(dino.state === 'hidden') {
                ctx.fillText(dino.bushEmoji, dino.x, dino.y);
            }
        });

        // 4. 繪製跟隨的恐龍隊伍
        let caughtCount = 0;
        ctx.font = '35px Arial';
        dinos.forEach(dino => {
            if(dino.state === 'caught') {
                caughtCount++;
                const historyIndex = caughtCount * 15; 
                const pos = player.history[historyIndex] || player.history[player.history.length-1];
                if(pos) {
                    ctx.fillText('🦖', ~~pos.x, ~~pos.y);
                }
            }
        });

        // 5. 繪製主角 🌼
        ctx.font = `${player.size}px Arial`;
        ctx.fillText(player.emoji, ~~player.x, ~~player.y);

        ctx.restore();
    }
</script>
</body>
</html>
