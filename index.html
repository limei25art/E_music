<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>12恐龍捉迷藏 - MIRROR篇</title>
    <style>
        /* Biophilic 自然療癒 UI - 森林營地風格 */
        :root {
            --leaf-green: #4A7043;
            --earth-brown: #8B6F47;
            --sky-blue: #A3C4C9;
            --sun-glow: #F4A261;
            --moss: #6B8E6B;
            --cream: #F5EDE1;
            --shadow-soft: rgba(74, 112, 67, 0.15);
        }

        * { 
            box-sizing: border-box; 
            user-select: none; 
            -webkit-user-select: none; 
        }
        
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #A3C4C9 0%, #C5D9B8 40%, #E8D9B8 100%);
            overflow: hidden; 
            touch-action: none;
            position: relative;
        }
        
        /* 細微葉紋背景 */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 30% 20%, rgba(139, 111, 71, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(74, 112, 67, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        canvas { 
            display: block; 
            z-index: 1;
            filter: contrast(1.05) saturate(1.1);
        }
        
        /* UI 疊層 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 10;
        }
        
        /* 頂部狀態欄 - 葉片風格 */
        .hud {
            display: flex; justify-content: space-between; padding: 40px 20px 20px;
            pointer-events: auto;
            width: 100%;
        }
        
        .pill {
            background: rgba(245, 237, 225, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 10px 22px; 
            border-radius: 50px;
            font-weight: 600; 
            color: var(--leaf-green);
            box-shadow: 0 6px 20px var(--shadow-soft);
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(139, 111, 71, 0.15);
        }
        
        .pill.highlight {
            background: rgba(244, 162, 97, 0.95);
            color: white;
            border-color: rgba(255,255,255,0.4);
            animation: gentle-sway 2.2s infinite ease-in-out;
        }

        @keyframes gentle-sway {
            0%, 100% { transform: scale(1) rotate(-1deg); }
            50% { transform: scale(1.04) rotate(1deg); }
        }

        /* 模態框 - 有機紙卡風格 */
        .modal-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(74, 112, 67, 0.45);
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; 
            transition: opacity 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
        }
        
        .modal-container.active {
            opacity: 1; pointer-events: auto;
        }
        
        .modal {
            background: var(--cream);
            width: 100%; 
            max-width: 480px;
            border-radius: 32px 32px 0 0; 
            padding: 42px 28px 60px;
            transform: translateY(120%);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            box-shadow: 0 -20px 50px var(--shadow-soft);
            border-top: 6px solid var(--moss);
        }
        
        .modal-container.active .modal { 
            transform: translateY(0); 
        }
        
        .center-modal { 
            align-items: center; 
            justify-content: center; 
        }
        
        .center-modal .modal { 
            border-radius: 32px; 
            width: 88%; 
            max-width: 420px;
            transform: scale(0.88); 
            padding: 48px 32px 40px;
            box-shadow: 0 20px 60px var(--shadow-soft);
        }
        
        .modal-container.active .center-modal .modal { 
            transform: scale(1); 
        }
        
        .modal h2 { 
            margin: 0 0 12px; 
            font-size: 26px; 
            color: var(--leaf-green); 
            font-weight: 700;
        }
        
        .modal p { 
            color: #5F6F5A; 
            font-size: 16.5px; 
            margin-bottom: 28px; 
            line-height: 1.5;
        }
        
        .btn {
            background: linear-gradient(135deg, var(--moss), var(--leaf-green));
            color: white; 
            border: none;
            width: 100%; 
            padding: 17px; 
            border-radius: 22px;
            font-size: 17px; 
            font-weight: 600; 
            margin-bottom: 14px;
            cursor: pointer; 
            transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 16px var(--shadow-soft);
        }
        
        .btn:active { 
            transform: scale(0.96);
            box-shadow: 0 3px 8px var(--shadow-soft);
        }
        
        .btn-outline { 
            background: transparent; 
            color: var(--leaf-green); 
            border: 2px solid var(--moss);
        }
        
        .btn-outline:active { 
            background: rgba(107, 142, 107, 0.1); 
        }

        .emoji-art { 
            font-size: 68px; 
            margin-bottom: 18px; 
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }
        
        /* 額外自然裝飾 */
        .leaf-accent {
            position: absolute;
            font-size: 28px;
            opacity: 0.15;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud" id="hud" style="display:none;">
            <div class="pill" id="timerDisplay">🌿 00:00</div>
            <div class="pill" id="scoreDisplay">🦖 0 / 12</div>
        </div>
    </div>

    <!-- 開始畫面 -->
    <div class="modal-container active center-modal" id="startScreen">
        <div class="modal">
            <div class="emoji-art">🌲🦖🌿</div>
            <h2>12恐龍捉迷藏</h2>
            <p>MIRROR 森林特別版<br>在療癒的綠林中尋找 12 隻隱藏的恐龍。<br>透過知識考驗與牠們成為朋友，一起回到中央營地！</p>
            <button class="btn" onclick="startGame()">開始森林探索</button>
        </div>
    </div>

    <!-- 問題畫面 -->
    <div class="modal-container" id="questionScreen">
        <div class="modal">
            <div class="emoji-art">🦖❓🌱</div>
            <h2 id="qTitle">發現野生恐龍！</h2>
            <p id="qText">問題載入中...</p>
            <div id="qOptions"></div>
        </div>
    </div>

    <!-- 營地提示 -->
    <div class="modal-container center-modal" id="campHintScreen">
        <div class="modal">
            <div class="emoji-art">⛺🌳🦖</div>
            <h2>已收服所有恐龍！</h2>
            <p>太棒了！你已與 12 隻 MIRROR 恐龍成為朋友。<br>現在，跟隨牠們回到地圖中央的 <strong>「中央營地 ⛺」</strong> 吧！</p>
            <button class="btn" style="background: linear-gradient(135deg, #F4A261, #E07A5F);" onclick="closeCampHint()">出發回營地</button>
        </div>
    </div>

    <!-- 結束畫面 -->
    <div class="modal-container center-modal" id="endScreen">
        <div class="modal">
            <div class="emoji-art">🌟🏞️⛺</div>
            <h2>成功回到營地！</h2>
            <p>你已將 12 隻 MIRROR 恐龍安全帶回大本營！<br>探索時間：<strong id="finalTime">00:00</strong></p>
            <button class="btn" onclick="location.reload()">再次探索森林</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const WORLD_SIZE = 1300;
    let gameState = 'start';
    let startTime = 0;
    let timerInterval = null;
    let timeElapsed = 0;
    
    let camera = { x: 200, y: 200 };
    let input = { isDown: false, x: 0, y: 0 };

    const player = {
        x: 200, y: 200,
        speed: 4.5, size: 40, emoji: '🥰',
        history: [], 
        caughtDinos: 0
    };

    const camp = {
        x: WORLD_SIZE / 2,
        y: WORLD_SIZE / 2,
        size: 70
    };
    
    const mirrorQuestions = [
        { q: "姜濤的粉絲名稱是什麼？", options: ["姜糖", "神徒", "爵屎"], ans: 0 },
        { q: "Anson Lo (盧瀚霆) 的專屬應援色是什麼？", options: ["粉紅色", "藍色", "綠色"], ans: 0 },
        { q: "Edan (呂爵安) 在《大叔的愛》中飾演什麼角色？", options: ["田一雄", "凌少牧", "翟國強"], ans: 0 },
        { q: "Ian (陳卓賢) 在入行前是哪一項運動的香港代表隊成員？", options: ["籃球", "排球", "足球"], ans: 1 },
        { q: "哪一首是 Jer (柳應廷) 的「物語系列」歌曲？", options: ["水刑物語", "狂人日記", "砂之器"], ans: 0 },
        { q: "AK 的全名是？", options: ["江𤒹生", "汪𤒹生", "江華生"], ans: 0 },
        { q: "Lokman (楊樂文) 在 MIRROR 中的職位是？", options: ["隊長", "副隊長", "忙內"], ans: 0 },
        { q: "Stanley (邱士縉) 有什麼稱號？", options: ["大表哥", "老虎仔", "皮皮"], ans: 0 },
        { q: "Frankie (陳瑞輝) 的別稱是什麼？", options: ["皮皮", "蛋白", "柳柳"], ans: 0 },
        { q: "Tiger (邱傲然) 最擅長的舞蹈/武術是？", options: ["拉丁舞", "芭蕾舞", "踢踏舞"], ans: 0 },
        { q: "Alton (王智德) 的經典金句是？", options: ["尋求無悔真生活", "焫焫焫焫焫著", "肌肉就是力量"], ans: 0 },
        { q: "Jeremy (李駿傑) 的粉絲名稱是？", options: ["Unicorn", "柳柳粉", "蛋白粉"], ans: 0 }
    ];

    const borders = [];
    const step = 50;
    for(let i = 0; i <= WORLD_SIZE; i += step) {
        borders.push({x: i, y: 0});
        borders.push({x: i, y: WORLD_SIZE});
        borders.push({x: 0, y: i});
        borders.push({x: WORLD_SIZE, y: i});
    }

    const trees = [];
    for(let i=0; i<80; i++) {
        let tx, ty;
        do {
            tx = Math.random() * (WORLD_SIZE - 100) + 50;
            ty = Math.random() * (WORLD_SIZE - 100) + 50;
        } while (Math.hypot(tx - camp.x, ty - camp.y) < 150);
        
        trees.push({
            x: tx, y: ty,
            emoji: ['🌲','🌳','🌴'][Math.floor(Math.random()*3)],
            size: Math.random() * 20 + 40
        });
    }

    const dinos = [];
    for(let i=0; i<12; i++) {
        let dx, dy;
        do {
            dx = Math.random() * (WORLD_SIZE - 200) + 100;
            dy = Math.random() * (WORLD_SIZE - 200) + 100;
        } while (Math.hypot(dx - camp.x, dy - camp.y) < 150);
        
        dinos.push({
            x: dx, y: dy,
            question: mirrorQuestions[i],
            state: 'hidden', 
            bushEmoji: '🌿'
        });
    }

    let currentDinoIndex = -1;

    function handleInputStart(e) {
        if(gameState !== 'playing') return;
        input.isDown = true;
        updateInputPos(e);
    }
    function handleInputMove(e) {
        if(!input.isDown || gameState !== 'playing') return;
        updateInputPos(e);
    }
    function handleInputEnd() { input.isDown = false; }
    
    function updateInputPos(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        input.x = clientX - canvas.width/2;
        input.y = clientY - canvas.height/2;
    }

    canvas.addEventListener('mousedown', handleInputStart);
    canvas.addEventListener('mousemove', handleInputMove);
    window.addEventListener('mouseup', handleInputEnd);
    canvas.addEventListener('touchstart', handleInputStart, {passive: false});
    canvas.addEventListener('touchmove', handleInputMove, {passive: false});
    window.addEventListener('touchend', handleInputEnd);

    window.startGame = function() {
        document.getElementById('startScreen').classList.remove('active');
        document.getElementById('hud').style.display = 'flex';
        gameState = 'playing';
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
        gameLoop();
    }

    function updateTimer() {
        if(gameState === 'start' || gameState === 'end') return;
        timeElapsed = Math.floor((Date.now() - startTime) / 1000);
        const m = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
        const s = String(timeElapsed % 60).padStart(2, '0');
        document.getElementById('timerDisplay').innerText = `🌿 ${m}:${s}`;
    }

    function triggerQuestion(index) {
        gameState = 'question';
        input.isDown = false;
        currentDinoIndex = index;
        const dino = dinos[index];
        
        document.getElementById('qText').innerText = dino.question.q;
        const optsDiv = document.getElementById('qOptions');
        optsDiv.innerHTML = '';
        
        dino.question.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            optsDiv.appendChild(btn);
        });
        
        document.getElementById('questionScreen').classList.add('active');
    }

    function checkAnswer(selectedIndex) {
        const dino = dinos[currentDinoIndex];
        if(selectedIndex === dino.question.ans) {
            document.getElementById('questionScreen').classList.remove('active');
            dino.state = 'caught';
            player.caughtDinos++;
            
            if(player.caughtDinos < 12) {
                document.getElementById('scoreDisplay').innerText = `🦖 ${player.caughtDinos} / 12`;
                gameState = 'playing';
            } else {
                document.getElementById('scoreDisplay').innerText = `🦖 12 / 12 ✨`;
                triggerCampHint();
            }
        } else {
            const title = document.getElementById('qTitle');
            title.innerText = "再試一次吧～";
            title.style.color = "#E07A5F";
            setTimeout(() => { 
                title.innerText = "發現野生恐龍！"; 
                title.style.color = "var(--leaf-green)"; 
            }, 1600);
        }
    }

    function triggerCampHint() {
        gameState = 'camp_hint';
        input.isDown = false;
        document.getElementById('campHintScreen').classList.add('active');
    }

    window.closeCampHint = function() {
        document.getElementById('campHintScreen').classList.remove('active');
        gameState = 'playing';
        
        const scoreDisp = document.getElementById('scoreDisplay');
        scoreDisp.innerText = `🧭 帶朋友回營地 ⛺`;
        scoreDisp.classList.add('highlight');
    }

    function endGame() {
        gameState = 'end';
        clearInterval(timerInterval);
        const m = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
        const s = String(timeElapsed % 60).padStart(2, '0');
        document.getElementById('finalTime').innerText = `${m}:${s}`;
        document.getElementById('hud').style.display = 'none';
        setTimeout(() => { document.getElementById('endScreen').classList.add('active'); }, 500);
    }

    function gameLoop() {
        update();
        draw();
        if(gameState !== 'end') requestAnimationFrame(gameLoop);
    }

    function update() {
        if(gameState !== 'playing') return;

        if(input.isDown) {
            const dist = Math.hypot(input.x, input.y);
            if(dist > 5) {
                const dx = (input.x / dist) * player.speed;
                const dy = (input.y / dist) * player.speed;
                player.x = Math.max(40, Math.min(WORLD_SIZE - 40, player.x + dx));
                player.y = Math.max(40, Math.min(WORLD_SIZE - 40, player.y + dy));
            }
        }

        player.history.unshift({x: player.x, y: player.y});
        if(player.history.length > 500) player.history.pop();   // 增加歷史長度

        camera.x += (player.x - camera.x) * 0.1;
        camera.y += (player.y - camera.y) * 0.1;

        if(player.caughtDinos < 12) {
            dinos.forEach((dino, index) => {
                if(dino.state === 'hidden') {
                    const dist = Math.hypot(player.x - dino.x, player.y - dino.y);
                    if(dist < 50) triggerQuestion(index);
                }
            });
        } else {
            const distToCamp = Math.hypot(player.x - camp.x, player.y - camp.y);
            if(distToCamp < 60) {
                endGame();
            }
        }
    }

    function draw() {
        ctx.fillStyle = '#C5D9B8';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(canvas.width/2 - camera.x, canvas.height/2 - camera.y);

        ctx.fillStyle = '#B8D0A8';
        ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 營地
        ctx.fillStyle = '#EFD9B4';
        ctx.beginPath();
        ctx.arc(camp.x, camp.y, 78, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#C4A36F';
        ctx.lineWidth = 5;
        ctx.setLineDash([6, 12]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.font = `${camp.size}px Arial`;
        ctx.fillText('⛺', camp.x, camp.y);

        // 邊界岩石
        ctx.font = `40px Arial`;
        borders.forEach(b => ctx.fillText('🪨', b.x, b.y));

        // 樹木
        trees.forEach(tree => {
            ctx.font = `${tree.size}px Arial`;
            ctx.fillText(tree.emoji, tree.x, tree.y);
        });

        // 隱藏恐龍
        dinos.forEach(dino => {
            if(dino.state === 'hidden') {
                ctx.font = `52px Arial`;
                ctx.fillText(dino.bushEmoji, dino.x, dino.y);
            }
        });

        // 已捉到的恐龍隊伍 - 加大間距
        let caughtCount = 0;
        dinos.forEach(dino => {
            if(dino.state === 'caught') {
                caughtCount++;
                const historyIndex = caughtCount * 5;   // ← 加大間距（原15 → 28）
                const pos = player.history[historyIndex] || player.history[player.history.length-1];
                if(pos) {
                    ctx.font = `38px Arial`;
                    ctx.fillText('🦖', pos.x, pos.y);
                }
            }
        });

        // 主角
        ctx.font = `${player.size}px Arial`;
        ctx.fillText(player.emoji, player.x, player.y);

        ctx.restore();
    }
</script>
</body>
</html>
